name: pylint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        # Installing the real runtime deps (httpx, fastapi, pydantic, uvicorn,
        # pydantic-settings, mcp) prevents pylint from emitting E0401 import-error
        # for every third-party module.
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pylint

      - name: Run pylint
        # Config (py-version, disables, fail-under) lives in pyproject.toml so
        # local `pylint $(git ls-files '*.py')` runs identically.
        run: |
          files=$(git ls-files '*.py')
          if [ -z "$files" ]; then
            echo "No Python files tracked; skipping."
            exit 0
          fi
          pylint $files
